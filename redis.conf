# Redis-lite Benchmark Configuration

port=8001              # Run backend nodes on 8001, 8002, 8003
leader_port=0
max_memory=500         # 500 MB to comfortably hold 50,000+ stress test keys
aof_file=database.aof
rdb_file=dump.rdb

# The Router will listen on 6379, backends report to 6379
router_port=6379

# Unix domain socket path (leave empty to disable)
unixsocket=

# DISABLE auto-save during benchmark to prevent disk I/O bottleneck
rdb_save_seconds=0

# Leave empty to disable authentication
requirepass=

# DISABLE slowlog to prevent mutex lock contention under heavy load
slowlog_threshold=-1
slowlog_max_len=128

tls_cert_file=redis.crt
tls_key_file=redis.key