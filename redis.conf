# Redis-lite Configuration

port=6379
leader_port=0
max_memory=50
aof_file=database.aof
rdb_file=dump.rdb
router_port=6379

# Unix domain socket path (leave empty to disable)
unixsocket=

# Auto-save RDB every N seconds (0 = disabled)
rdb_save_seconds=900

# Leave empty to disable authentication
requirepass=

# Slowlog: log commands slower than N ms (-1 to disable)
slowlog_threshold=10
slowlog_max_len=128